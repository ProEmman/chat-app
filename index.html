<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat App</title>
  <style>
    :root {
      --bg: #efeae2;
      --panel: #ffffff;
      --sidebar: #f7f9fb;
      --header: #0f8b8d;
      --header-dark: #0a5f61;
      --accent: #25d366;
      --accent-dark: #128c7e;
      --message-me: #dcf8c6;
      --message-other: #ffffff;
      --text: #1f2933;
      --muted: #607080;
      --border: #d7e0e6;
      --shadow: 0 20px 45px rgba(15, 51, 69, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 211, 102, 0.18), transparent 28%),
        linear-gradient(160deg, #e3f6eb 0%, #efeae2 42%, #dff1ef 100%);
      color: var(--text);
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .join-screen {
      width: min(380px, 100%);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: var(--shadow);
    }

    .join-screen h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    .join-screen p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    .join-screen input,
    .composer input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
    }

    .join-screen input:focus,
    .composer input:focus {
      border-color: var(--accent-dark);
      box-shadow: 0 0 0 3px rgba(18, 140, 126, 0.12);
    }

    button {
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .join-screen button,
    .send-button {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fff;
    }

    .join-screen button {
      width: 100%;
      margin-top: 14px;
      padding: 14px 16px;
      font-size: 1rem;
    }

    .chat-layout {
      display: none;
      width: min(1180px, 100%);
      height: min(92vh, 860px);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .sidebar {
      width: 320px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header,
    .chat-header {
      padding: 20px;
      background: linear-gradient(135deg, var(--header) 0%, var(--header-dark) 100%);
      color: #fff;
    }

    .sidebar-header h2,
    .chat-header h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .sidebar-header p,
    .chat-header p {
      margin: 6px 0 0;
      font-size: 0.92rem;
      opacity: 0.92;
    }

    .room-list {
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .room-button {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      background: #fff;
      color: var(--text);
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .room-button.active {
      border-color: rgba(18, 140, 126, 0.25);
      background: rgba(37, 211, 102, 0.12);
    }

    .room-button small {
      display: block;
      color: var(--muted);
      font-weight: 500;
      margin-top: 4px;
    }

    .room-badge {
      min-width: 44px;
      padding: 6px 8px;
      border-radius: 999px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      background: rgba(15, 139, 141, 0.12);
      color: var(--header-dark);
    }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.9)),
        radial-gradient(circle at center, rgba(37, 211, 102, 0.08), transparent 55%);
    }

    .typing-indicator {
      min-height: 24px;
      padding: 8px 20px;
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
    }

    #messages {
      list-style: none;
      margin: 0;
      padding: 0 20px 20px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      flex-direction: column;
      max-width: min(78%, 520px);
      gap: 4px;
    }

    .message-row.mine {
      align-self: flex-end;
    }

    .message-row.other {
      align-self: flex-start;
    }

    .message-meta {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0 6px;
    }

    .message-bubble {
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.5;
      box-shadow: 0 8px 18px rgba(31, 41, 51, 0.08);
      word-break: break-word;
    }

    .message-row.mine .message-bubble {
      background: var(--message-me);
      border-bottom-right-radius: 6px;
    }

    .message-row.other .message-bubble {
      background: var(--message-other);
      border: 1px solid rgba(96, 112, 128, 0.12);
      border-bottom-left-radius: 6px;
    }

    .message-time {
      font-size: 0.76rem;
      color: var(--muted);
      text-align: right;
      margin-top: 8px;
    }

    .empty-state {
      margin: auto;
      width: min(420px, calc(100% - 40px));
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(96, 112, 128, 0.12);
      border-radius: 24px;
      padding: 28px 24px;
    }

    .composer {
      padding: 16px 20px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-top: 1px solid rgba(96, 112, 128, 0.12);
      background: rgba(255, 255, 255, 0.92);
    }

    .send-button {
      padding: 14px 22px;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .app-shell {
        padding: 0;
      }

      .chat-layout {
        height: 100vh;
        border-radius: 0;
      }

      .sidebar {
        width: 100%;
        max-height: 36vh;
      }

      .chat-layout {
        flex-direction: column;
      }
    }

    @media (max-width: 560px) {
      .room-list {
        padding: 12px;
      }

      .chat-header,
      .sidebar-header,
      .typing-indicator,
      #messages,
      .composer {
        padding-left: 14px;
        padding-right: 14px;
      }

      .composer {
        flex-direction: column;
      }

      .send-button {
        width: 100%;
      }

      .message-row {
        max-width: 88%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section id="joinScreen" class="join-screen">
      <h1>Welcome to Chat App</h1>
      <p>Join the public room, then click any online username to start a private conversation.</p>
      <input id="joinUsername" type="text" placeholder="Enter your username" autocomplete="off" />
      <button id="joinButton" type="button">Join Chat</button>
    </section>

    <main id="chatLayout" class="chat-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2 id="sidebarTitle">Rooms</h2>
          <p id="sidebarSubtitle">Choose a chat and start messaging.</p>
        </div>
        <div id="roomList" class="room-list"></div>
      </aside>

      <section class="chat-panel">
        <div class="chat-header">
          <h2 id="chatTitle">Public Chat</h2>
          <p id="chatSubtitle">Everyone online can see messages here.</p>
        </div>

        <div id="typingIndicator" class="typing-indicator"></div>

        <ul id="messages"></ul>

        <form id="messageForm" class="composer">
          <input id="input" type="text" placeholder="Type your message..." autocomplete="off" />
          <button class="send-button" type="submit">Send</button>
        </form>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const PUBLIC_ROOM = 'public';

    let socket = null;
    let username = '';
    let currentTargetUser = PUBLIC_ROOM;
    let isTyping = false;
    let typingTimeout = null;
    const typingUsers = new Set();
    const onlineUsers = [];
    const messageStore = {};

    function formatClock(value) {
      return new Date(value).toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getStoreKey(targetUser) {
      return targetUser && targetUser !== PUBLIC_ROOM
        ? [username, targetUser].sort().join('__')
        : PUBLIC_ROOM;
    }

    function getTypingKey(payload) {
      return payload.type === 'private' ? payload.user + '__' + payload.targetUser : payload.user + '__public';
    }

    function scrollToBottom(smooth) {
      const messageList = document.getElementById('messages');
      messageList.scrollTo({
        top: messageList.scrollHeight,
        behavior: smooth ? 'smooth' : 'auto'
      });
    }

    function updateChatHeader() {
      const title = document.getElementById('chatTitle');
      const subtitle = document.getElementById('chatSubtitle');

      if (currentTargetUser === PUBLIC_ROOM) {
        title.textContent = 'Public Chat';
        subtitle.textContent = 'Everyone online can see messages here.';
      } else {
        title.textContent = currentTargetUser;
        subtitle.textContent = 'Private conversation between you and ' + currentTargetUser + '.';
      }
    }

    function renderRoomList() {
      const roomList = document.getElementById('roomList');
      roomList.innerHTML = '';

      const publicButton = document.createElement('button');
      publicButton.type = 'button';
      publicButton.className = 'room-button' + (currentTargetUser === PUBLIC_ROOM ? ' active' : '');
      publicButton.innerHTML =
        '<div><strong>Public Chat</strong><small>Global room for everyone</small></div>' +
        '<span class="room-badge">All</span>';
      publicButton.addEventListener('click', function() {
        switchRoom(PUBLIC_ROOM);
      });
      roomList.appendChild(publicButton);

      onlineUsers
        .filter(function(name) {
          return name !== username;
        })
        .forEach(function(name) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'room-button' + (currentTargetUser === name ? ' active' : '');
          button.innerHTML =
            '<div><strong>' + escapeHtml(name) + '</strong><small>Click for private chat</small></div>' +
            '<span class="room-badge">1:1</span>';
          button.addEventListener('click', function() {
            switchRoom(name);
          });
          roomList.appendChild(button);
        });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderMessages(smoothScroll) {
      const messageList = document.getElementById('messages');
      const roomKey = getStoreKey(currentTargetUser);
      const activeMessages = messageStore[roomKey] || [];

      messageList.innerHTML = '';

      if (activeMessages.length === 0) {
        const emptyState = document.createElement('li');
        emptyState.className = 'empty-state';
        emptyState.textContent = currentTargetUser === PUBLIC_ROOM
          ? 'No messages yet. Start the public conversation.'
          : 'No private messages yet. Say hello to ' + currentTargetUser + '.';
        messageList.appendChild(emptyState);
        return;
      }

      activeMessages.forEach(function(data) {
        const row = document.createElement('li');
        const mine = data.user === username;
        row.className = 'message-row ' + (mine ? 'mine' : 'other');

        const meta = document.createElement('div');
        meta.className = 'message-meta';
        meta.textContent = mine ? 'You' : data.user;

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = data.text;

        const time = document.createElement('div');
        time.className = 'message-time';
        time.textContent = formatClock(data.timestamp);

        row.appendChild(meta);
        row.appendChild(bubble);
        row.appendChild(time);
        messageList.appendChild(row);
      });

      scrollToBottom(smoothScroll);
    }

    function renderTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      const visibleNames = [];

      typingUsers.forEach(function(key) {
        const parts = key.split('__');
        const user = parts[0];
        const target = parts[1];

        if (currentTargetUser === PUBLIC_ROOM && target === 'public') {
          visibleNames.push(user);
        }

        if (currentTargetUser !== PUBLIC_ROOM && target === currentTargetUser) {
          visibleNames.push(user);
        }
      });

      if (visibleNames.length === 0) {
        indicator.textContent = '';
      } else if (visibleNames.length === 1) {
        indicator.textContent = visibleNames[0] + ' is typing...';
      } else {
        indicator.textContent = 'Several people are typing...';
      }
    }

    function stopTyping() {
      if (!socket || !username) return;

      if (isTyping) {
        socket.emit('stop typing', { targetUser: currentTargetUser });
        isTyping = false;
      }

      if (typingTimeout) {
        clearTimeout(typingTimeout);
        typingTimeout = null;
      }
    }

    function startTyping() {
      if (!socket || !username) return;

      if (!isTyping) {
        socket.emit('typing', { targetUser: currentTargetUser });
        isTyping = true;
      }

      if (typingTimeout) {
        clearTimeout(typingTimeout);
      }

      typingTimeout = setTimeout(stopTyping, 1200);
    }

    function switchRoom(targetUser) {
      currentTargetUser = targetUser || PUBLIC_ROOM;
      stopTyping();
      updateChatHeader();
      renderRoomList();
      renderMessages(false);
      renderTypingIndicator();

      if (socket) {
        socket.emit('load history', currentTargetUser);
      }
    }

    function handleIncomingMessage(data) {
      const roomKey = data.room;

      if (!messageStore[roomKey]) {
        messageStore[roomKey] = [];
      }

      messageStore[roomKey].push(data);

      const isActivePublic = currentTargetUser === PUBLIC_ROOM && data.room === PUBLIC_ROOM;
      const isActivePrivate = currentTargetUser !== PUBLIC_ROOM && data.room === getStoreKey(currentTargetUser);

      if (isActivePublic || isActivePrivate) {
        renderMessages(true);
      }
    }

    function setupSocket() {
      socket = io();

      socket.on('chat history', function(payload) {
        messageStore[payload.room] = payload.messages || [];

        if (payload.type === 'public') {
          currentTargetUser = PUBLIC_ROOM;
        } else if (payload.targetUser) {
          currentTargetUser = payload.targetUser;
        }

        updateChatHeader();
        renderRoomList();
        renderMessages(false);
        renderTypingIndicator();
      });

      socket.on('chat message', function(data) {
        typingUsers.delete(data.user + '__public');
        if (data.targetUser) {
          typingUsers.delete(data.user + '__' + data.targetUser);
        }
        renderTypingIndicator();
        handleIncomingMessage(data);
      });

      socket.on('user list', function(users) {
        onlineUsers.length = 0;
        users.forEach(function(name) {
          onlineUsers.push(name);
        });
        renderRoomList();
      });

      socket.on('typing', function(payload) {
        if (!payload || payload.user === username) return;
        typingUsers.add(getTypingKey(payload));
        renderTypingIndicator();
      });

      socket.on('stop typing', function(payload) {
        if (!payload) return;
        typingUsers.delete(getTypingKey(payload));
        renderTypingIndicator();
      });

      socket.on('chat error', function(message) {
        alert(message);
      });

      socket.on('join error', function(message) {
        alert(message);
        document.getElementById('joinScreen').style.display = 'block';
        document.getElementById('chatLayout').style.display = 'none';
      });
    }

    function joinChat() {
      const joinInput = document.getElementById('joinUsername');
      const enteredName = joinInput.value.trim();

      if (!enteredName) {
        alert('Please enter a username.');
        joinInput.focus();
        return;
      }

      username = enteredName;
      document.getElementById('joinScreen').style.display = 'none';
      document.getElementById('chatLayout').style.display = 'flex';
      document.getElementById('sidebarTitle').textContent = username + '\'s chats';
      document.getElementById('sidebarSubtitle').textContent = 'Public room plus online private chats.';
      document.getElementById('input').focus();

      setupSocket();
      socket.emit('join', username);
    }

    function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();

      if (!text || !socket || !username) return;

      stopTyping();
      socket.emit('chat message', {
        text: text,
        targetUser: currentTargetUser
      });

      input.value = '';
      input.focus();
    }

    document.getElementById('joinButton').addEventListener('click', joinChat);

    document.getElementById('joinUsername').addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        joinChat();
      }
    });

    document.getElementById('messageForm').addEventListener('submit', function(event) {
      event.preventDefault();
      sendMessage();
    });

    document.getElementById('input').addEventListener('input', function(event) {
      if (!event.target.value.trim()) {
        stopTyping();
        return;
      }

      startTyping();
    });
  </script>
</body>
</html>
