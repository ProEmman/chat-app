<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat App</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #ece5dd;
      color: #1f2933;
    }

    .join-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .join-card {
      width: min(360px, 100%);
      background: #fff;
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .join-card h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .join-card p {
      margin-top: 0;
      margin-bottom: 18px;
      color: #6b7280;
    }

    input,
    button {
      font: inherit;
    }

    .join-card input,
    .message-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
    }

    .join-card button,
    .message-box button,
    .public-chat-button {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .join-card button,
    .message-box button {
      width: 100%;
      margin-top: 12px;
      padding: 12px 14px;
      background: #25d366;
      color: #fff;
    }

    .chat-app {
      display: none;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #fff;
      border-right: 1px solid #dfe3e8;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 18px 16px;
      background: #075e54;
      color: #fff;
    }

    .sidebar-header h2 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .sidebar-header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .users-panel {
      padding: 14px;
      overflow-y: auto;
      flex: 1;
    }

    .public-chat-button {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      background: #e8f5e9;
      color: #166534;
      text-align: left;
    }

    .user-item {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 10px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #f9fafb;
      text-align: left;
      cursor: pointer;
    }

    .user-item.active,
    .public-chat-button.active {
      background: #dcf8c6;
      border-color: #7acb83;
    }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #efeae2;
    }

    .chat-header {
      padding: 18px 20px;
      background: #128c7e;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .chat-header h2 {
      margin: 0 0 4px;
      font-size: 20px;
    }

    .chat-header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.92;
    }

    #messages {
      list-style: none;
      margin: 0;
      padding: 18px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 75%;
      padding: 10px 12px;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      word-break: break-word;
      cursor: pointer;
    }

    .message.mine {
      align-self: flex-end;
      background: #dcf8c6;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: #fff;
      border-bottom-left-radius: 4px;
    }

    .message.private {
      border: 1px solid #93c5fd;
    }

    .message-name {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #4b5563;
      margin-bottom: 4px;
    }

    .message-text {
      display: block;
      font-size: 14px;
      line-height: 1.4;
    }

    .reply-quote {
      display: block;
      margin-bottom: 8px;
      padding: 8px 10px;
      border-left: 3px solid #60a5fa;
      border-radius: 10px;
      background: rgba(147, 197, 253, 0.18);
    }

    .reply-quote-name {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #1d4ed8;
      margin-bottom: 3px;
    }

    .reply-quote-text {
      display: block;
      font-size: 12px;
      color: #475569;
      padding-left: 6px;
    }

    .message-time {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: #6b7280;
      text-align: right;
    }

    .reply-preview {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      background: #e0f2fe;
      border-top: 1px solid #dfe3e8;
      border-bottom: 1px solid #dfe3e8;
    }

    .reply-preview.active {
      display: flex;
    }

    .reply-preview-text {
      min-width: 0;
    }

    .reply-preview-label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #0369a1;
      margin-bottom: 2px;
    }

    .reply-preview-message {
      display: block;
      font-size: 13px;
      color: #334155;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reply-cancel {
      width: auto;
      min-width: auto;
      margin-top: 0;
      padding: 8px 12px;
      background: #ef4444;
      color: #fff;
    }

    .message-box {
      display: flex;
      gap: 10px;
      padding: 14px;
      background: #f8fafc;
      border-top: 1px solid #dfe3e8;
    }

    .message-box input {
      flex: 1;
    }

    .message-box button {
      width: auto;
      min-width: 100px;
      margin-top: 0;
    }

    @media (min-width: 761px) {
      .chat-app {
        display: none;
      }

      .chat-app.active {
        display: flex;
      }
    }

    @media (max-width: 760px) {
      .chat-app.active {
        display: block;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #dfe3e8;
      }

      .message-box {
        flex-direction: column;
      }

      .message-box button {
        width: 100%;
      }

      .message {
        max-width: 88%;
      }
    }
  </style>
</head>
<body>
  <div id="joinScreen" class="join-screen">
    <div class="join-card">
      <h1>Join Chat</h1>
      <p>Enter your username to start chatting.</p>
      <input id="joinUsername" type="text" placeholder="Enter your username" autocomplete="off" />
      <button id="joinButton" type="button">Join</button>
    </div>
  </div>

  <div id="chatApp" class="chat-app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Online Users</h2>
        <p>Click a user to start a private chat.</p>
      </div>

      <div class="users-panel">
        <button id="publicChatButton" class="public-chat-button active" type="button">
          Public Chat
        </button>
        <div id="onlineList"></div>
      </div>
    </aside>

    <main class="chat-panel">
      <div class="chat-header">
        <h2 id="chatTitle">Public Chat</h2>
        <p id="chatStatus">Messages are visible to everyone.</p>
      </div>

      <ul id="messages"></ul>

      <div id="replyPreview" class="reply-preview">
        <div class="reply-preview-text">
          <span id="replyPreviewLabel" class="reply-preview-label"></span>
          <span id="replyPreviewMessage" class="reply-preview-message"></span>
        </div>
        <button id="cancelReplyButton" class="reply-cancel" type="button">X</button>
      </div>

      <form id="messageForm" class="message-box">
        <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    let username = '';
    let selectedUser = '';
    let publicMessages = [];
    const privateMessages = {};
    let replyToMessage = null;

    function formatTime(date) {
      return date.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function scrollToBottom() {
      const messages = document.getElementById('messages');
      messages.scrollTop = messages.scrollHeight;
    }

    function truncateReplyText(text) {
      const cleanText = String(text || '').trim();
      if (cleanText.length <= 60) {
        return cleanText;
      }

      return cleanText.slice(0, 57) + '...';
    }

    function getCurrentMessages() {
      if (!selectedUser) {
        return publicMessages;
      }

      return privateMessages[selectedUser] || [];
    }

    function updateActiveChatUI() {
      const chatTitle = document.getElementById('chatTitle');
      const chatStatus = document.getElementById('chatStatus');
      const publicChatButton = document.getElementById('publicChatButton');
      const userButtons = document.querySelectorAll('.user-item');

      if (!selectedUser) {
        chatTitle.textContent = 'Public Chat';
        chatStatus.textContent = 'Messages are visible to everyone.';
        publicChatButton.classList.add('active');
      } else {
        chatTitle.textContent = 'Chatting with ' + selectedUser;
        chatStatus.textContent = 'Private chat with ' + selectedUser;
        publicChatButton.classList.remove('active');
      }

      userButtons.forEach(function(button) {
        if (button.dataset.username === selectedUser) {
          button.classList.add('active');
        } else {
          button.classList.remove('active');
        }
      });
    }

    function updateReplyPreview() {
      const preview = document.getElementById('replyPreview');
      const label = document.getElementById('replyPreviewLabel');
      const message = document.getElementById('replyPreviewMessage');

      if (!replyToMessage) {
        preview.classList.remove('active');
        label.textContent = '';
        message.textContent = '';
        return;
      }

      preview.classList.add('active');
      label.textContent = 'Replying to ' + replyToMessage.username;
      message.textContent = truncateReplyText(replyToMessage.message);
    }

    function clearReply() {
      replyToMessage = null;
      updateReplyPreview();
    }

    function setReply(message) {
      replyToMessage = {
        username: message.user,
        message: message.text
      };
      updateReplyPreview();
      document.getElementById('input').focus();
    }

    function renderMessages() {
      const messagesList = document.getElementById('messages');
      const currentMessages = getCurrentMessages();

      messagesList.innerHTML = '';

      currentMessages.forEach(function(message) {
        const item = document.createElement('li');
        const isMine = message.user === username;

        item.className = 'message ' + (isMine ? 'mine' : 'other');

        if (message.private) {
          item.className += ' private';
        }

        const name = document.createElement('span');
        name.className = 'message-name';
        name.textContent = isMine ? 'You' : message.user;

        const text = document.createElement('span');
        text.className = 'message-text';
        text.textContent = message.text;

        if (message.replyTo) {
          const quote = document.createElement('div');
          quote.className = 'reply-quote';

          const quoteName = document.createElement('span');
          quoteName.className = 'reply-quote-name';
          quoteName.textContent = message.replyTo.username;

          const quoteText = document.createElement('span');
          quoteText.className = 'reply-quote-text';
          quoteText.textContent = message.replyTo.message;

          quote.appendChild(quoteName);
          quote.appendChild(quoteText);
          item.appendChild(quote);
        }

        const time = document.createElement('span');
        time.className = 'message-time';
        time.textContent = message.time;

        item.appendChild(name);
        item.appendChild(text);
        item.appendChild(time);
        item.addEventListener('click', function() {
          setReply(message);
        });
        messagesList.appendChild(item);
      });

      scrollToBottom();
    }

    function renderUserList(users) {
      const onlineList = document.getElementById('onlineList');
      onlineList.innerHTML = '';

      users.forEach(function(name) {
        if (name === username) {
          return;
        }

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'user-item';
        button.dataset.username = name;
        button.textContent = name;

        button.addEventListener('click', function() {
          selectedUser = name;
          clearReply();
          updateActiveChatUI();
          renderMessages();
        });

        onlineList.appendChild(button);
      });

      updateActiveChatUI();
    }

    function addPrivateMessage(message) {
      const otherUser = message.from === username ? message.to : message.from;

      if (!privateMessages[otherUser]) {
        privateMessages[otherUser] = [];
      }

      privateMessages[otherUser].push({
        user: message.from,
        text: message.text,
        time: message.time,
        private: true,
        replyTo: message.replyTo || null
      });

      if (selectedUser === otherUser) {
        renderMessages();
      }
    }

    function joinChat() {
      const joinInput = document.getElementById('joinUsername');
      const enteredUsername = joinInput.value.trim();

      if (!enteredUsername) {
        alert('Please enter a username.');
        joinInput.focus();
        return;
      }

      username = enteredUsername;
      socket = io();

      socket.on('chat history', function(history) {
        publicMessages = Array.isArray(history) ? history : [];
        if (!selectedUser) {
          renderMessages();
        }
      });

      socket.on('chat message', function(message) {
        publicMessages.push(message);
        if (!selectedUser) {
          renderMessages();
        }
      });

      socket.on('private message', function(message) {
        addPrivateMessage(message);
      });

      socket.on('user list', function(users) {
        const stillOnline = users.indexOf(selectedUser) !== -1;
        if (selectedUser && !stillOnline) {
          selectedUser = '';
        }

        renderUserList(users);
        renderMessages();
      });

      socket.on('chat error', function(message) {
        alert(message);
      });

      socket.on('join error', function(message) {
        alert(message);
        socket.disconnect();
      });

      socket.emit('join', username);

      document.getElementById('joinScreen').style.display = 'none';
      document.getElementById('chatApp').classList.add('active');
      document.getElementById('input').focus();
      updateActiveChatUI();
    }

    function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();

      if (!text || !socket) {
        return;
      }

      socket.emit('chat message', {
        text: text,
        time: formatTime(new Date()),
        targetUser: selectedUser,
        replyTo: replyToMessage
      });

      input.value = '';
      clearReply();
      input.focus();
    }

    document.getElementById('joinButton').addEventListener('click', joinChat);

    document.getElementById('joinUsername').addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        joinChat();
      }
    });

    document.getElementById('publicChatButton').addEventListener('click', function() {
      selectedUser = '';
      clearReply();
      updateActiveChatUI();
      renderMessages();
    });

    document.getElementById('cancelReplyButton').addEventListener('click', function() {
      clearReply();
    });

    document.getElementById('messageForm').addEventListener('submit', function(event) {
      event.preventDefault();
      sendMessage();
    });
  </script>
</body>
</html>
